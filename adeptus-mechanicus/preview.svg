<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#110D0A"/>
      <stop offset="100%" style="stop-color:#0A0805"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="50%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:rgba(196,30,42,0.08)"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#vignette)"/>

  <!-- Binary rain strip at top -->
  <rect x="0" y="0" width="800" height="18" fill="#0A0805"/>
  <text x="10" y="13" font-family="monospace" font-size="9" fill="#C41E2A" opacity="0.3" letter-spacing="1">01001101 01000101 01000011 01001000 01000001 01001110 01001001 01000011 01010101 01010011 01001101 01000101 01000011 01001000</text>
  <line x1="0" y1="18" x2="800" y2="18" stroke="#2A1A0F" stroke-width="1"/>

  <!-- Top accent line -->
  <rect x="0" y="18" width="800" height="2" fill="#C41E2A" filter="url(#glow)" opacity="0.7"/>

  <!-- Header area -->
  <text x="400" y="55" text-anchor="middle" font-family="monospace" font-size="10" fill="#B8860B" letter-spacing="6" opacity="0.6">COMMITLORE // STYLE PREVIEW</text>

  <!-- Cog decoration -->
  <circle cx="400" cy="95" r="25" fill="none" stroke="#C41E2A" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="95" r="18" fill="none" stroke="#B8860B" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="400" cy="95" r="8" fill="#C41E2A" opacity="0.7"/>
  <circle cx="400" cy="95" r="4" fill="#B8860B" opacity="0.9"/>
  <!-- Cog teeth -->
  <g stroke="#C41E2A" stroke-width="2" opacity="0.4">
    <line x1="400" y1="65" x2="400" y2="72"/><line x1="400" y1="118" x2="400" y2="125"/>
    <line x1="370" y1="95" x2="377" y2="95"/><line x1="423" y1="95" x2="430" y2="95"/>
    <line x1="379" y1="74" x2="383" y2="80"/><line x1="417" y1="110" x2="421" y2="116"/>
    <line x1="421" y1="74" x2="417" y2="80"/><line x1="383" y1="110" x2="379" y2="116"/>
  </g>

  <!-- Title -->
  <text x="400" y="155" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#C41E2A" letter-spacing="4" filter="url(#glowStrong)">ADEPTUS MECHANICUS</text>
  <text x="400" y="175" text-anchor="middle" font-family="monospace" font-size="9" fill="#B8860B" letter-spacing="3" opacity="0.5">01001101 01000101 01000011 01001000 01000001 01001110 01001001 01000011 01010101 01010011</text>

  <!-- Divider -->
  <line x1="150" y1="190" x2="650" y2="190" stroke="#C41E2A" stroke-width="1" filter="url(#glow)" opacity="0.5"/>

  <!-- Stats cards with double borders -->
  <g transform="translate(50, 210)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="160" height="85" fill="#110D0A" stroke="#2A1A0F" stroke-width="1"/>
    <rect x="3" y="3" width="154" height="79" fill="none" stroke="#C41E2A" stroke-width="0.5" opacity="0.3"/>
    <text x="80" y="40" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#B8860B" filter="url(#glow)">312</text>
    <text x="80" y="62" text-anchor="middle" font-family="monospace" font-size="8" fill="#C41E2A" letter-spacing="2">// TOTAL RITES</text>
  </g>
  <g transform="translate(225, 210)">
    <rect x="0" y="0" width="160" height="85" fill="#110D0A" stroke="#2A1A0F" stroke-width="1"/>
    <rect x="3" y="3" width="154" height="79" fill="none" stroke="#C41E2A" stroke-width="0.5" opacity="0.3"/>
    <text x="80" y="40" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#B8860B" filter="url(#glow)">127</text>
    <text x="80" y="62" text-anchor="middle" font-family="monospace" font-size="8" fill="#C41E2A" letter-spacing="2">// AUGMENTATIONS</text>
  </g>
  <g transform="translate(400, 210)">
    <rect x="0" y="0" width="160" height="85" fill="#110D0A" stroke="#2A1A0F" stroke-width="1"/>
    <rect x="3" y="3" width="154" height="79" fill="none" stroke="#C41E2A" stroke-width="0.5" opacity="0.3"/>
    <text x="80" y="40" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#B8860B" filter="url(#glow)">58</text>
    <text x="80" y="62" text-anchor="middle" font-family="monospace" font-size="8" fill="#C41E2A" letter-spacing="2">// HERESIES PURGED</text>
  </g>
  <g transform="translate(575, 210)">
    <rect x="0" y="0" width="160" height="85" fill="#110D0A" stroke="#2A1A0F" stroke-width="1"/>
    <rect x="3" y="3" width="154" height="79" fill="none" stroke="#C41E2A" stroke-width="0.5" opacity="0.3"/>
    <text x="80" y="40" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#C41E2A" filter="url(#glow)">5</text>
    <text x="80" y="62" text-anchor="middle" font-family="monospace" font-size="8" fill="#C41E2A" letter-spacing="2">// SCHISMS</text>
  </g>

  <!-- Chart area mock — bar chart -->
  <g transform="translate(50, 320)">
    <text x="0" y="0" font-family="serif" font-size="9" fill="#C41E2A" letter-spacing="2" font-weight="bold">TEMPORAL ACTIVITY RECORD</text>
    <text x="0" y="12" font-family="monospace" font-size="7" fill="#B8860B" opacity="0.5">01001101</text>
    <rect x="20" y="40" width="28" height="85" fill="#C41E2A" opacity="0.9" rx="1"/>
    <rect x="58" y="25" width="28" height="100" fill="#C41E2A" opacity="0.9" rx="1"/>
    <rect x="96" y="55" width="28" height="70" fill="#C41E2A" opacity="0.9" rx="1"/>
    <rect x="134" y="15" width="28" height="110" fill="#C41E2A" opacity="0.9" rx="1"/>
    <rect x="172" y="35" width="28" height="90" fill="#C41E2A" opacity="0.9" rx="1"/>
    <rect x="210" y="50" width="28" height="75" fill="#C41E2A" opacity="0.9" rx="1"/>
    <rect x="248" y="30" width="28" height="95" fill="#C41E2A" opacity="0.9" rx="1"/>
    <line x1="15" y1="125" x2="285" y2="125" stroke="#2A1A0F" stroke-width="1"/>
  </g>

  <!-- Donut chart mock -->
  <g transform="translate(580, 395)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#C41E2A" stroke-width="16" stroke-dasharray="95 225" opacity="0.9"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#B8860B" stroke-width="16" stroke-dasharray="60 260" stroke-dashoffset="-95" opacity="0.9"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#8B0000" stroke-width="16" stroke-dasharray="35 285" stroke-dashoffset="-155" opacity="0.9"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#2A1A0F" stroke-width="16" stroke-dasharray="25 295" stroke-dashoffset="-190" opacity="0.7"/>
  </g>
  <text x="580" y="325" text-anchor="middle" font-family="serif" font-size="9" fill="#C41E2A" letter-spacing="2" font-weight="bold">RITE CLASSIFICATION</text>
  <text x="580" y="337" text-anchor="middle" font-family="monospace" font-size="7" fill="#B8860B" opacity="0.5">01001101</text>

  <!-- Bottom accent line -->
  <rect x="0" y="482" width="800" height="2" fill="#C41E2A" filter="url(#glow)" opacity="0.4"/>

  <!-- Footer -->
  <text x="400" y="475" text-anchor="middle" font-family="monospace" font-size="9" fill="#B8860B" letter-spacing="3" opacity="0.4">01001101 01000101 01000011 01001000</text>
  <text x="400" y="495" text-anchor="middle" font-family="serif" font-size="11" fill="#C41E2A" letter-spacing="3" font-weight="bold">OMNISSIAH PROTECTS</text>
</svg>
