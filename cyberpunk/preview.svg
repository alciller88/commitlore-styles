<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#12121A"/>
      <stop offset="100%" style="stop-color:#0A0A0F"/>
    </linearGradient>
    <linearGradient id="neonLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="50%" style="stop-color:#FCEE09"/>
      <stop offset="100%" style="stop-color:#FF2D6B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Scanlines pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="2" fill="rgba(0,0,0,0.15)"/>
    </pattern>
    <!-- Cut corner clip -->
    <clipPath id="cutCard1">
      <polygon points="0,0 238,0 250,12 250,140 12,140 0,128"/>
    </clipPath>
    <clipPath id="cutCard2">
      <polygon points="0,0 238,0 250,12 250,140 12,140 0,128"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#FCEE09" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="500"/><line x1="80" y1="0" x2="80" y2="500"/>
    <line x1="160" y1="0" x2="160" y2="500"/><line x1="240" y1="0" x2="240" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/><line x1="560" y1="0" x2="560" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/><line x1="720" y1="0" x2="720" y2="500"/>
  </g>

  <!-- Top neon border -->
  <rect x="0" y="0" width="800" height="3" fill="url(#neonLine)" filter="url(#glow)"/>

  <!-- Header area -->
  <text x="400" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#00D9FF" letter-spacing="8" opacity="0.7">COMMITLORE // STYLE PREVIEW</text>

  <!-- Main title with glitch effect layers -->
  <text x="398" y="105" text-anchor="middle" font-family="monospace" font-size="42" font-weight="bold" fill="#00D9FF" opacity="0.3" letter-spacing="6">CYBERPUNK</text>
  <text x="402" y="105" text-anchor="middle" font-family="monospace" font-size="42" font-weight="bold" fill="#FF2D6B" opacity="0.3" letter-spacing="6">CYBERPUNK</text>
  <text x="400" y="105" text-anchor="middle" font-family="monospace" font-size="42" font-weight="bold" fill="#FCEE09" letter-spacing="6" filter="url(#glowStrong)">CYBERPUNK</text>

  <text x="400" y="130" text-anchor="middle" font-family="monospace" font-size="12" fill="#E0E0E0" opacity="0.5" letter-spacing="4">NIGHT CITY NEVER SLEEPS</text>

  <!-- Neon divider -->
  <line x1="100" y1="150" x2="700" y2="150" stroke="url(#neonLine)" stroke-width="1" filter="url(#glow)"/>

  <!-- Stats cards with cut corners -->
  <g transform="translate(50, 175)">
    <!-- Card 1 -->
    <polygon points="0,0 155,0 167,12 167,90 12,90 0,78" fill="#12121A" stroke="#1E1E2E" stroke-width="1"/>
    <text x="83" y="42" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#FCEE09" filter="url(#glow)">247</text>
    <text x="83" y="65" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D9FF" letter-spacing="3">OPERATIONS</text>
  </g>
  <g transform="translate(230, 175)">
    <polygon points="0,0 155,0 167,12 167,90 12,90 0,78" fill="#12121A" stroke="#1E1E2E" stroke-width="1"/>
    <text x="83" y="42" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#FCEE09" filter="url(#glow)">89</text>
    <text x="83" y="65" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D9FF" letter-spacing="3">UPGRADES</text>
  </g>
  <g transform="translate(410, 175)">
    <polygon points="0,0 155,0 167,12 167,90 12,90 0,78" fill="#12121A" stroke="#1E1E2E" stroke-width="1"/>
    <text x="83" y="42" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#FCEE09" filter="url(#glow)">42</text>
    <text x="83" y="65" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D9FF" letter-spacing="3">PATCHES</text>
  </g>
  <g transform="translate(590, 175)">
    <polygon points="0,0 155,0 167,12 167,90 12,90 0,78" fill="#12121A" stroke="#1E1E2E" stroke-width="1"/>
    <text x="83" y="42" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#FF2D6B" filter="url(#glow)">3</text>
    <text x="83" y="65" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D9FF" letter-spacing="3">ALERTS</text>
  </g>

  <!-- Chart area mock -->
  <g transform="translate(50, 290)">
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#FCEE09" letter-spacing="3" opacity="0.8">// ACTIVITY SCAN</text>
    <!-- Bar chart bars -->
    <rect x="20" y="60" width="30" height="90" fill="#FCEE09" opacity="0.9" rx="1"/>
    <rect x="65" y="30" width="30" height="120" fill="#FCEE09" opacity="0.9" rx="1"/>
    <rect x="110" y="80" width="30" height="70" fill="#FCEE09" opacity="0.9" rx="1"/>
    <rect x="155" y="15" width="30" height="135" fill="#FCEE09" opacity="0.9" rx="1"/>
    <rect x="200" y="50" width="30" height="100" fill="#FCEE09" opacity="0.9" rx="1"/>
    <rect x="245" y="70" width="30" height="80" fill="#FCEE09" opacity="0.9" rx="1"/>
    <rect x="290" y="40" width="30" height="110" fill="#FCEE09" opacity="0.9" rx="1"/>
    <!-- Axis -->
    <line x1="15" y1="150" x2="330" y2="150" stroke="#1E1E2E" stroke-width="1"/>
  </g>

  <!-- Donut chart mock -->
  <g transform="translate(580, 380)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#FCEE09" stroke-width="18" stroke-dasharray="100 250" opacity="0.9"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#00D9FF" stroke-width="18" stroke-dasharray="70 280" stroke-dashoffset="-100" opacity="0.9"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#FF2D6B" stroke-width="18" stroke-dasharray="40 310" stroke-dashoffset="-170" opacity="0.9"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#1E1E2E" stroke-width="18" stroke-dasharray="30 320" stroke-dashoffset="-210" opacity="0.7"/>
  </g>
  <text x="580" y="310" text-anchor="middle" font-family="monospace" font-size="10" fill="#00D9FF" letter-spacing="3" opacity="0.8">// TYPE DIST</text>

  <!-- Bottom neon border -->
  <rect x="0" y="485" width="800" height="3" fill="url(#neonLine)" filter="url(#glow)" opacity="0.6"/>

  <!-- Footer -->
  <text x="400" y="478" text-anchor="middle" font-family="monospace" font-size="10" fill="#00D9FF" letter-spacing="4" opacity="0.4">// COMPILED BY COMMITLORE</text>

  <!-- Scanlines overlay -->
  <rect width="800" height="500" fill="url(#scanlines)" opacity="0.3"/>
</svg>
